name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3). Bumps all packages, publishes opencode to npm, and creates a GitHub release."
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: opencode
        run: bun install

      - name: Run integration tests
        run: bun test tests/

  version:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Ensure workflow runs from default branch
        if: ${{ github.ref_name != github.event.repository.default_branch }}
        run: |
          echo "Releases must be dispatched from ${{ github.event.repository.default_branch }}."
          exit 1

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Bump versions
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="$VERSION" node <<'EOF'
          const fs = require('fs')

          const version = process.env.VERSION
          const updateJsonFile = (file, transform) => {
            const current = JSON.parse(fs.readFileSync(file, 'utf8'))
            const next = transform(current)
            fs.writeFileSync(file, `${JSON.stringify(next, null, 2)}\n`)
          }

          updateJsonFile('opencode/package.json', (pkg) => ({ ...pkg, version }))
          updateJsonFile('claude/package.json', (pkg) => ({ ...pkg, version }))
          updateJsonFile('claude/.claude-plugin/plugin.json', (plugin) => ({ ...plugin, version }))
          updateJsonFile('.claude-plugin/marketplace.json', (marketplace) => ({
            ...marketplace,
            plugins: marketplace.plugins.map((plugin, index) => index === 0 ? { ...plugin, version } : plugin),
          }))
          EOF

      - name: Commit and tag
        id: tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add claude/package.json opencode/package.json claude/.claude-plugin/plugin.json .claude-plugin/marketplace.json

          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to ${{ inputs.version }}"
            git push
          fi

          if git rev-parse -q --verify "refs/tags/v${{ inputs.version }}" >/dev/null; then
            git tag -d "v${{ inputs.version }}"
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/v${{ inputs.version }}" >/dev/null; then
            git push origin ":refs/tags/v${{ inputs.version }}"
          fi

          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
          echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"

  publish-opencode:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest

      - name: Publish akm-opencode
        working-directory: opencode
        run: npm publish --provenance --access public

  github-release:
    needs: [version, publish-opencode]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Create GitHub release
        run: |
          gh release create "${{ needs.version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ needs.version.outputs.tag }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
