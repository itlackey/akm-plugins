name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3). Bumps all packages, publishes opencode to npm, and creates a GitHub release."
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: opencode
        run: bun install

      - name: Run integration tests
        run: bun test tests/

  version:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Ensure workflow runs from default branch
        if: ${{ github.ref_name != github.event.repository.default_branch }}
        run: |
          echo "Releases must be dispatched from ${{ github.event.repository.default_branch }}."
          exit 1

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Bump versions
        run: |
          VERSION="${{ inputs.version }}"

          # Bump opencode package.json
          cd opencode && npm version "$VERSION" --no-git-tag-version && cd ..

          # Bump claude package.json
          cd claude && npm version "$VERSION" --no-git-tag-version && cd ..

          # Bump claude plugin.json version
          cd claude/.claude-plugin
          node -e "const f='plugin.json'; const p=JSON.parse(require('fs').readFileSync(f,'utf8')); p.version='$VERSION'; require('fs').writeFileSync(f, JSON.stringify(p, null, 2)+'\n')"
          cd ../..

          # Bump marketplace.json version
          cd .claude-plugin
          node -e "const f='marketplace.json'; const p=JSON.parse(require('fs').readFileSync(f,'utf8')); p.plugins[0].version='$VERSION'; require('fs').writeFileSync(f, JSON.stringify(p, null, 2)+'\n')"
          cd ..

      - name: Commit and tag
        id: tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add claude/package.json opencode/package.json claude/.claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push
          git push origin "v${{ inputs.version }}"
          echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"

  publish-opencode:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest

      - name: Publish akm-opencode
        working-directory: opencode
        run: npm publish --provenance --access public

  github-release:
    needs: [version, publish-opencode]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Create GitHub release
        run: |
          gh release create "${{ needs.version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ needs.version.outputs.tag }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
